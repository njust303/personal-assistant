name: 📊 自动更新股票数据

on:
  schedule:
    # 每小时更新一次（UTC 时间）
    # 北京时间 = UTC + 8，所以是每小时的整点
    - cron: '0 * * * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: 📦 安装依赖
        run: |
          pip install requests
      
      - name: 🔄 运行爬虫更新数据
        run: |
          cd h5-app
          python3 fetch_stock_data.py
      
      - name: 📊 检查数据文件
        run: |
          ls -la h5-app/stock_data.json
          cat h5-app/stock_data.json | head -30
      
      - name: 🚀 提交并推送数据
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add h5-app/stock_data.json
          if git diff --staged --quiet; then
            echo "ℹ️ 数据无变化，跳过提交"
          else
            git commit -m "data: 自动更新股票数据 $(date '+%Y-%m-%d %H:%M')"
            git push
            echo "✅ 数据已更新并推送"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
